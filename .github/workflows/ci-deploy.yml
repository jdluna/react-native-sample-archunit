name: CI & Deploy

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --coverage

      - name: Run folder structure validation
        run: npm run arch:check

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/coverage-final.json
          flags: unittests
          name: codecov-umbrella
        continue-on-error: true

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run folder structure validation
        run: npm run arch:check

      - name: Create documentation site
        run: |
          mkdir -p public
          cat > public/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Analytics Module - Architecture & Test Results</title>
              <style>
                  * {
                      margin: 0;
                      padding: 0;
                      box-sizing: border-box;
                  }
                  
                  body {
                      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
                      line-height: 1.6;
                      color: #333;
                      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                      min-height: 100vh;
                      padding: 20px;
                  }
                  
                  .container {
                      max-width: 1200px;
                      margin: 0 auto;
                      background: white;
                      border-radius: 12px;
                      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
                      overflow: hidden;
                  }
                  
                  header {
                      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                      color: white;
                      padding: 40px 20px;
                      text-align: center;
                  }
                  
                  header h1 {
                      font-size: 2.5em;
                      margin-bottom: 10px;
                  }
                  
                  header p {
                      font-size: 1.1em;
                      opacity: 0.95;
                  }
                  
                  main {
                      padding: 40px 20px;
                  }
                  
                  section {
                      margin-bottom: 40px;
                  }
                  
                  section h2 {
                      font-size: 1.8em;
                      color: #667eea;
                      margin-bottom: 20px;
                      border-bottom: 3px solid #667eea;
                      padding-bottom: 10px;
                  }
                  
                  .status-badge {
                      display: inline-block;
                      padding: 10px 20px;
                      border-radius: 6px;
                      font-weight: bold;
                      margin: 10px 10px 10px 0;
                  }
                  
                  .status-success {
                      background: #10b981;
                      color: white;
                  }
                  
                  .status-info {
                      background: #3b82f6;
                      color: white;
                  }
                  
                  .architecture-diagram {
                      background: #f3f4f6;
                      padding: 20px;
                      border-radius: 8px;
                      overflow-x: auto;
                      margin: 20px 0;
                  }
                  
                  .architecture-diagram pre {
                      font-family: 'Courier New', monospace;
                      font-size: 0.9em;
                      color: #374151;
                  }
                  
                  table {
                      width: 100%;
                      border-collapse: collapse;
                      margin: 20px 0;
                  }
                  
                  table th {
                      background: #f3f4f6;
                      padding: 12px;
                      text-align: left;
                      font-weight: 600;
                      border-bottom: 2px solid #e5e7eb;
                  }
                  
                  table td {
                      padding: 12px;
                      border-bottom: 1px solid #e5e7eb;
                  }
                  
                  table tr:hover {
                      background: #fafafa;
                  }
                  
                  .rules-grid {
                      display: grid;
                      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
                      gap: 20px;
                      margin: 20px 0;
                  }
                  
                  .rule-card {
                      border: 2px solid #e5e7eb;
                      border-radius: 8px;
                      padding: 20px;
                      background: #fafafa;
                      transition: all 0.3s ease;
                  }
                  
                  .rule-card:hover {
                      border-color: #667eea;
                      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.1);
                  }
                  
                  .rule-card h4 {
                      color: #667eea;
                      margin-bottom: 10px;
                  }
                  
                  footer {
                      background: #f3f4f6;
                      padding: 20px;
                      text-align: center;
                      color: #666;
                      border-top: 1px solid #e5e7eb;
                  }
                  
                  .cta-button {
                      display: inline-block;
                      margin-top: 20px;
                      padding: 12px 30px;
                      background: #667eea;
                      color: white;
                      text-decoration: none;
                      border-radius: 6px;
                      font-weight: 600;
                      transition: background 0.3s ease;
                  }
                  
                  .cta-button:hover {
                      background: #764ba2;
                  }
              </style>
          </head>
          <body>
              <div class="container">
                  <header>
                      <h1>📊 Analytics Module</h1>
                      <p>React Native Library with Enforced Layer Architecture</p>
                  </header>
                  
                  <main>
                      <section>
                          <h2>✅ Build Status</h2>
                          <div>
                              <span class="status-badge status-success">Folder Structure: VALID</span>
                              <span class="status-badge status-success">Unit Tests: PASSING</span>
                              <span class="status-badge status-info">Last Updated: <script>document.write(new Date().toLocaleString())</script></span>
                          </div>
                      </section>
                      
                      <section>
                          <h2>🏗️ Required Folder Structure</h2>
                          <p>This project enforces the following required layer folders:</p>
                          <div class="architecture-diagram">
                              <pre>┌─────────────────────────────────────────────────────────────┐
│                         Module                              │
│                                                             │
│  ┌──────────────────┐   ┌─────────────────────────────┐    │
│  │  Contracts layer │◄──│     Presentation layer      │    │
│  │                  │   │  ViewModels · RN Screens     │    │
│  │  ITelemetry-     │   └─────────────────────────────┘    │
│  │  Contract        │                                       │
│  │  IAnalyticsSDK-  │   ┌─────────────────────────────┐    │
│  │  Contract        │◄──│       Domain layer           │    │
│  │                  │   │  Use Cases · Repo interfaces │    │
│  └──────────────────┘   └─────────────────────────────┘    │
│                                                             │
│                         ┌─────────────────────────────┐    │
│                    ◄────│        Data layer            │    │
│                         │  Repositories · DataSources  │    │
│                         └─────────────────────────────┘    │
│                                                             │
│  ┌─────────────────────────────────────────────────────┐   │
│  │                  DI Container                        │   │
│  │         Binds interfaces to implementations          │   │
│  └─────────────────────────────────────────────────────┘   │
└─────────────────────────────────────────────────────────────┘
  Layers consume contracts → DI / Service Locator injects impls</pre>
                          </div>
                      </section>
                      
                      <section>
                          <h2>📋 Validation Rules (5 total)</h2>
                          <div class="rules-grid">
                              <div class="rule-card">
                                  <h4>Folder 1: src/contracts</h4>
                                  <p>Contracts layer - contains interface definitions and contracts.</p>
                              </div>
                              <div class="rule-card">
                                  <h4>Folder 2: src/domain</h4>
                                  <p>Domain layer - contains use cases and repository interfaces.</p>
                              </div>
                              <div class="rule-card">
                                  <h4>Folder 3: src/data</h4>
                                  <p>Data layer - contains repository implementations and data sources.</p>
                              </div>
                              <div class="rule-card">
                                  <h4>Folder 4: src/presentation</h4>
                                  <p>Presentation layer - contains ViewModels and UI screens.</p>
                              </div>
                              <div class="rule-card">
                                  <h4>Folder 5: src/di</h4>
                                  <p>DI Container - contains dependency injection configuration and wiring.</p>
                              </div>
                          </div>
                      </section>
                      
                      <section>
                          <h2>🚀 Running Validation Locally</h2>
                          <pre style="background: #f3f4f6; padding: 15px; border-radius: 8px; overflow-x: auto; color: #374151;"><code># Install dependencies
npm install

# Run all tests
npm test

# Run only folder structure validation
npm run arch:check</code></pre>
                      </section>
                      
                      <section>
                          <h2>📚 Project Structure</h2>
                          <p>This React Native analytics module maintains a clean layered architecture with strict folder structure validation:</p>
                          <table>
                              <tr>
                                  <th>Folder</th>
                                  <th>Purpose</th>
                              </tr>
                              <tr>
                                  <td><code>src/contracts/</code></td>
                                  <td>Interface definitions and contracts</td>
                              </tr>
                              <tr>
                                  <td><code>src/domain/</code></td>
                                  <td>Business logic (use cases, repository interfaces)</td>
                              </tr>
                              <tr>
                                  <td><code>src/data/</code></td>
                                  <td>Data layer (repositories, data sources)</td>
                              </tr>
                              <tr>
                                  <td><code>src/presentation/</code></td>
                                  <td>UI layer (ViewModels, Screens)</td>
                              </tr>
                              <tr>
                                  <td><code>src/di/</code></td>
                                  <td>Dependency injection configuration</td>
                              </tr>
                          </table>
                          <a href="https://github.com" class="cta-button">View on GitHub</a>
                      </section>
                  </main>
                  
                  <footer>
                      <p>Generated by GitHub Actions CI/CD Pipeline</p>
                      <p style="font-size: 0.9em; margin-top: 10px;">Commit: <code><script>fetch('https://api.github.com/repos/' + location.pathname.split('/').slice(1, 3).join('/') + '/commits?per_page=1')
                          .then(r => r.json())
                          .then(d => document.write(d[0]?.sha?.substring(0, 7) || 'N/A'))
                          .catch(() => {})</script></code></p>
                  </footer>
              </div>
          </body>
          </html>
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v3

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: 'public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2
